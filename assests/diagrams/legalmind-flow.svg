<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #05070d; rx: 8px; stroke: #0f172a; stroke-width: 2; }
