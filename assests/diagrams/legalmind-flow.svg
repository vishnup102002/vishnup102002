      .txt-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #94a3b8; }
      .txt-accent { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #6ee7b7; }
      .txt-purple { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #c084fc; }
      .txt-gold { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #fde68a; }
      .line { stroke: #334155; stroke-width: 2; fill: none; stroke-dasharray: 4 4; }
      .status { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #10b981; font-weight: 700; }
    </style>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
