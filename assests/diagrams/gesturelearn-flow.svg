<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #05070d; rx: 8px; stroke: #0f172a; stroke-width: 2; }
      .header-title { font-family: 'Space Grotesk', 'Fira Code', monospace; font-size: 13px; fill: #38bdf8; font-weight: 700; letter-spacing: 1.5px; }
      .container-box { fill: rgba(15, 23, 42, 0.4); stroke: #1e293b; stroke-width: 1.5; rx: 8px; }
      .box { fill: #0f172a; stroke: #1e293b; stroke-width: 1.5; rx: 6px; }
      .box-active { fill: #0c1a2e; stroke: #38bdf8; stroke-width: 1.5; rx: 6px; }
      .box-ml { fill: #082f25; stroke: #10b981; stroke-width: 1.5; rx: 6px; }
      .box-fsm { fill: #180d2b; stroke: #a855f7; stroke-width: 1.5; rx: 6px; }
      .box-relay { fill: #2a1b08; stroke: #f59e0b; stroke-width: 1.5; rx: 6px; }
      .box-alert { fill: #220a11; stroke: #f43f5e; stroke-width: 1.5; rx: 6px; }
      .txt-title { font-family: 'Inter', sans-serif; font-size: 11px; fill: #f8fafc; font-weight: 700; }
      .txt-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #94a3b8; }
      .txt-accent { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #6ee7b7; }
      .txt-purple { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #c084fc; }
      .txt-gold { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: #fde68a; }
      .line { stroke: #334155; stroke-width: 2; fill: none; stroke-dasharray: 4 4; }
      .status { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #10b981; font-weight: 700; }
    </style>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="1100" height="700" class="bg" />
  <text x="25" y="32" class="header-title">> GESTURELEARN // REAL-TIME COMPUTER VISION &amp; WEBRTC COLLABORATION PIPELINE</text>

  <!-- FLOW PATHS (SMIL Animation Targets) -->
  <path id="path-signaling-1" d="M 160 120 L 210 120 L 210 160 L 270 160" class="line" />
  <path id="path-signaling-2" d="M 390 160 L 430 160 M 160 150 L 430 150" class="line" />
  <path id="path-dual-1" d="M 690 135 L 730 110 L 770 110" class="line" />
  <path id="path-dual-2" d="M 690 135 L 730 165 L 770 165" class="line" />
  <path id="path-ml-1" d="M 215 345 L 255 345" class="line" />
  <path id="path-ml-2" d="M 395 345 L 435 345" class="line" />
  <path id="path-fsm-branch" d="M 595 345 L 635 345" class="line" />
  <path id="path-relay-1" d="M 230 565 L 280 565" class="line" />
  <path id="path-relay-2" d="M 490 565 L 540 565" class="line" />
  <path id="path-relay-3" d="M 780 565 L 830 565" class="line" />

  <!-- CONTAINER 1: PHASE 1 — WEBRTC SIGNALING & PEER DISCOVERY -->
  <rect x="25" y="60" width="515" height="180" class="container-box" />
  <text x="40" y="80" class="header-title" font-size="10px" fill="#38bdf8">PHASE 1: WEBRTC SIGNALING &amp; PEER DISCOVERY</text>

  <g transform="translate(40, 95)">
    <rect width="120" height="75" class="box-active" />
    <text x="10" y="20" class="txt-title">Client A (Joiner)</text>
    <text x="10" y="38" class="txt-sub">• /room/:roomId</text>
    <text x="10" y="52" class="txt-sub">• join-room Event</text>
    <text x="10" y="66" class="txt-sub">• Local Video Ingest</text>
  </g>

  <g transform="translate(270, 130)">
    <rect width="120" height="60" class="box" />
    <text x="10" y="18" class="txt-title">Express / Socket.io</text>
    <text x="10" y="34" class="txt-sub">• Room Registry</text>
    <text x="10" y="48" class="txt-sub">• Peer Discovery</text>
  </g>

  <g transform="translate(430, 105)">
    <rect width="95" height="110" class="box-active" />
    <text x="8" y="18" class="txt-title">Client B (Peer)</text>
    <text x="8" y="36" class="txt-sub">• STUN / TURN</text>
    <text x="8" y="50" class="txt-sub">• SDP Offer/Ans</text>
    <text x="8" y="64" class="txt-sub">• ICE Handshake</text>
    <text x="8" y="80" class="txt-title" fill="#10b981">Direct P2P</text>
    <text x="8" y="94" class="txt-accent">DTLS / SRTP</text>
  </g>


  <!-- CONTAINER 2: PHASE 2 — DUAL-STREAM MIRROR & INGEST ENGINE -->
  <rect x="560" y="60" width="515" height="180" class="container-box" />
  <text x="575" y="80" class="header-title" font-size="10px" fill="#10b981">PHASE 2: DUAL-STREAM MIRROR &amp; INGEST ENGINE</text>

  <g transform="translate(575, 105)">
    <rect width="115" height="60" class="box" />
    <text x="8" y="20" class="txt-title">User Webcam</text>
    <text x="8" y="36" class="txt-sub">• getUserMedia()</text>
    <text x="8" y="50" class="txt-sub">• 30 FPS Video</text>
  </g>

  <g transform="translate(770, 90)">
    <rect width="135" height="40" class="box-ml" />
    <text x="8" y="16" class="txt-title" fill="#10b981">1. Raw Video Stream</text>
    <text x="8" y="30" class="txt-accent">MediaPipe (Unflipped)</text>
  </g>

  <g transform="translate(770, 145)">
    <rect width="135" height="40" class="box-ml" />
    <text x="8" y="16" class="txt-title" fill="#10b981">2. Offscreen Canvas</text>
    <text x="8" y="30" class="txt-accent">ctx.scaleX(-1) Blit</text>
  </g>

  <g transform="translate(930, 105)">
    <rect width="130" height="60" class="box-active" />
    <text x="8" y="18" class="txt-title">captureStream(30)</text>
    <text x="8" y="34" class="txt-sub">• Pre-Flipped Track</text>
    <text x="8" y="48" class="txt-sub">• WebRTC P2P Sync</text>
  </g>


  <!-- CONTAINER 3: PHASE 3 — EDGE ML & SPATIAL FSM ENGINE -->
  <rect x="25" y="260" width="1050" height="200" class="container-box" />
  <text x="40" y="280" class="header-title" font-size="10px" fill="#a855f7">PHASE 3: EDGE ML &amp; SPATIAL FINITE STATE MACHINE (FSM)</text>

  <g transform="translate(40, 310)">
    <rect width="175" height="70" class="box-ml" />
    <text x="10" y="20" class="txt-title" fill="#10b981">MediaPipe WASM Engine</text>
    <text x="10" y="38" class="txt-accent">• GPU / WASM Client Inference</text>
    <text x="10" y="52" class="txt-accent">• Extracts 21 3D Hand Landmarks</text>
  </g>

  <g transform="translate(255, 310)">
    <rect width="140" height="70" class="box" />
    <text x="10" y="20" class="txt-title">Coordinate Norm</text>
    <text x="10" y="38" class="txt-sub">flippedNormX =</text>
    <text x="10" y="52" class="txt-sub">1.0 - rawNormX</text>
  </g>

  <g transform="translate(435, 310)">
    <rect width="160" height="70" class="box-fsm" />
    <text x="10" y="20" class="txt-title" fill="#c084fc">Spatial FSM Evaluator</text>
    <text x="10" y="38" class="txt-purple">• Euclidean Distance Rules</text>
    <text x="10" y="52" class="txt-purple">• State Logic Decision Tree</text>
  </g>

  <!-- FSM Rule Branches -->
  <g transform="translate(635, 295)">
    <rect width="425" height="150" class="box" />
    <text x="12" y="20" class="txt-title" fill="#f8fafc">CLASSIFIER RULE MATRIX (EUCLIDEAN THRESHOLDS):</text>
    <text x="12" y="42" class="txt-accent">✏️  DRAW MODE     : L-Shape (Index Extended + Thumb &gt; 0.10 Norm Dist)</text>
    <text x="12" y="62" class="txt-sub">🧹  ERASE MODE    : Flat Palm (Index/Middle/Ring/Pinky Extended &gt; 60px)</text>
    <text x="12" y="82" class="txt-purple">🗑️  CLEAR CANVAS  : Closed Fist (All 5 Folded below Knuckles for 2s)</text>
    <text x="12" y="102" class="txt-gold">👉  HOVER CURSOR  : Pinch Gesture (Index to Thumb Distance &lt; 0.04)</text>
    <text x="12" y="122" class="txt-sub">🎨  COLOR PALETTE : Peace Sign (Index &amp; Middle Extended, Hit-Test UI)</text>
  </g>


  <!-- CONTAINER 4: PHASE 4 — REAL-TIME RENDERING & SOCKET RELAY TIER -->
  <rect x="25" y="480" width="1050" height="150" class="container-box" />
  <text x="40" y="500" class="header-title" font-size="10px" fill="#f59e0b">PHASE 4: REAL-TIME RENDERING &amp; SOCKET RELAY TIER</text>

  <g transform="translate(40, 525)">
    <rect width="190" height="80" class="box-fsm" />
    <text x="10" y="20" class="txt-title" fill="#c084fc">1. Local Smooth Render</text>
    <text x="10" y="38" class="txt-purple">• Exponential Smoothing (α=0.92)</text>
    <text x="10" y="54" class="txt-purple">• Immediate Local Canvas Draw</text>
    <text x="10" y="70" class="txt-purple">• Instant Zero-Latency Feedback</text>
  </g>

  <g transform="translate(280, 525)">
    <rect width="210" height="80" class="box-relay" />
    <text x="10" y="20" class="txt-title" fill="#f59e0b">2. Socket.io Payload Emission</text>
    <text x="10" y="38" class="txt-gold">• socket.emit("gesture-draw")</text>
    <text x="10" y="54" class="txt-gold">• Normalized {prev, curr} Vector</text>
    <text x="10" y="70" class="txt-gold">• Color, Mode, Thickness Meta</text>
  </g>

  <g transform="translate(540, 525)">
    <rect width="240" height="80" class="box" />
    <text x="10" y="20" class="txt-title">3. Express / Socket.io Relay Server</text>
    <text x="10" y="38" class="txt-sub">• socket.to(roomId).emit("gesture-draw")</text>
    <text x="10" y="54" class="txt-sub">• Sub-50ms Non-Volatile Packet Relay</text>
    <text x="10" y="70" class="txt-sub">• 0% Server ML Inference Load</text>
  </g>

  <g transform="translate(830, 525)">
    <rect width="230" height="80" class="box-active" />
    <text x="10" y="20" class="txt-title" fill="#38bdf8">4. Remote Peer Canvas Re-Map</text>
    <text x="10" y="38" class="txt-sub">• normFlippedToCanvas() Ingest</text>
    <text x="10" y="54" class="txt-sub">• Aspect Ratio Letterbox Fix</text>
    <text x="10" y="70" class="txt-sub">• Pixel-Accurate Remote Overlay</text>
  </g>


  <!-- FINAL DELIVERABLE DISPLAY -->
  <g transform="translate(320, 642)">
    <rect width="460" height="40" class="box-ml" />
    <text x="14" y="24" class="txt-title" fill="#10b981">✨ FINAL DELIVERABLE: Real-Time P2P Video + Sub-50ms Synchronized Air Canvas</text>
  </g>


  <!-- LIGHT PULSE ANIMATIONS (DATA PACKETS) -->
  <!-- Signaling Pulses -->
  <circle r="5" fill="#38bdf8" filter="url(#glow-cyan)">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M 160 120 L 210 120 L 210 160 L 270 160 M 390 160 L 430 160" />
  </circle>

  <!-- Dual Stream Pulses -->
  <circle r="4" fill="#10b981" filter="url(#glow-green)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M 690 135 L 730 110 L 770 110" />
  </circle>
  <circle r="4" fill="#38bdf8" filter="url(#glow-cyan)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M 690 135 L 730 165 L 770 165" />
  </circle>

  <!-- ML / FSM Pulses -->
  <circle r="5" fill="#10b981" filter="url(#glow-green)">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 215 345 L 255 345" />
  </circle>

  <circle r="5" fill="#a855f7" filter="url(#glow-purple)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M 395 345 L 435 345 M 595 345 L 635 345" />
  </circle>

  <!-- Relay Pulses -->
  <circle r="5" fill="#f59e0b" filter="url(#glow-gold)">
    <animateMotion dur="1.2s" repeatCount="indefinite" path="M 230 565 L 280 565 M 490 565 L 540 565 M 780 565 L 830 565" />
  </circle>

  <!-- FOOTER SYSTEM TELEMETRY -->
  <line x1="25" y1="680" x2="1075" y2="680" stroke="#1e293b" stroke-width="1" />
  <text x="25" y="694" class="status">● INFERENCE: CLIENT-SIDE WASM/GPU</text>
  <text x="360" y="694" class="status" fill="#a855f7">FPS: 30 STABLE</text>
  <text x="610" y="694" class="status" fill="#f59e0b">LATENCY: &lt;50MS SYNC (VERIFIED 99%)</text>
  <text x="910" y="694" class="status" fill="#38bdf8">SERVER LOAD: 0% ML</text>
</svg>
