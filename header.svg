<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@700;800;900&amp;display=swap');
      
      .brick-text {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        text-shadow: 1px 2px 0px rgba(0, 0, 0, 0.5);
      }
      .subtitle {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 5px;
        fill: #94a3b8;
      }
      .code-line {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #10b981;
      }

      /* Subtle border glow pulse animation */
      @keyframes borderPulse {
        0% {
          stroke-width: 1.5;
          stroke-opacity: 0.3;
          filter: drop-shadow(0 0 0px rgba(16, 185, 129, 0));
        }
        50% {
          stroke-width: 2;
          stroke-opacity: 0.6;
          filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
        }
        100% {
          stroke-width: 1.5;
          stroke-opacity: 0.3;
          filter: drop-shadow(0 0 0px rgba(16, 185, 129, 0));
        }
      }

      .glow-border {
        animation: borderPulse 2.5s ease-in-out 0.3s, borderPulse 2.5s ease-in-out 3s;
      }
    </style>
    
    <!-- Deep Skunkworks background -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>

    <!-- Ambient glow filters -->
    <filter id="blur-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="35" />
    </filter>

    <!-- 3D depth shadow filters -->
    <filter id="brick-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.4" flood-color="#000000" />
    </filter>

    <!-- Knob gradient for depth -->
    <radialGradient id="knob-gradient-red" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#be123c" />
    </radialGradient>

    <radialGradient id="knob-gradient-green" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#6ee7b7" />
      <stop offset="100%" stop-color="#047857" />
    </radialGradient>

    <radialGradient id="knob-gradient-blue" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </radialGradient>

    <!-- Brick face gradients for depth -->
    <linearGradient id="brick-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <linearGradient id="brick-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="brick-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>

  <!-- Baseplate Background -->
  <rect width="850" height="200" fill="url(#bg-gradient)" rx="10" />
  
  <!-- Animated Glow Border -->
  <rect class="glow-border" width="850" height="200" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" rx="10" />

  <!-- Ambient Glow Orbs (matching portfolio orb-1, orb-2, orb-3) -->
  <circle cx="200" cy="90" r="130" fill="#10b981" opacity="0.06" filter="url(#blur-filter)"/>
  <circle cx="650" cy="100" r="110" fill="#38bdf8" opacity="0.05" filter="url(#blur-filter)"/>
  <circle cx="425" cy="140" r="80" fill="#f43f5e" opacity="0.04" filter="url(#blur-filter)"/>

  <!-- The Premium Lego Bricks (translated to X=180, Y=25) -->
  <g transform="translate(180, 25)">
    
    <!-- V: Red (#f43f5e) - Premium Lego -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(0, 0)">
        <!-- Brick face -->
        <rect x="0" y="8" width="60" height="68" rx="4" fill="url(#brick-red)" stroke="#0f172a" stroke-width="2" />
        
        <!-- Top edge highlight for 3D depth -->
        <rect x="0" y="8" width="60" height="3" fill="rgba(255, 255, 255, 0.15)" rx="4" />
        
        <!-- Side shadow for depth -->
        <polygon points="60,8 63,5 63,73 60,76" fill="rgba(0, 0, 0, 0.3)" />
        
        <!-- Premium sleek knobs (2 knobs instead of 4 for cleaner look) -->
        <!-- Left knob -->
        <circle cx="18" cy="-2" r="8" fill="url(#knob-gradient-red)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="18" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <!-- Inner highlight on knob -->
        <circle cx="16" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <!-- Right knob -->
        <circle cx="42" cy="-2" r="8" fill="url(#knob-gradient-red)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="42" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <!-- Inner highlight on knob -->
        <circle cx="40" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <!-- Character -->
        <text x="30" y="52" class="brick-text" font-size="40" fill="#ffffff" text-anchor="middle">V</text>
      </g>
    </g>

    <!-- i: Green (#10b981) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(68, 0)">
        <rect x="0" y="8" width="60" height="68" rx="4" fill="url(#brick-green)" stroke="#0f172a" stroke-width="2" />
        <rect x="0" y="8" width="60" height="3" fill="rgba(255, 255, 255, 0.15)" rx="4" />
        <polygon points="60,8 63,5 63,73 60,76" fill="rgba(0, 0, 0, 0.3)" />
        
        <circle cx="18" cy="-2" r="8" fill="url(#knob-gradient-green)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="18" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="16" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <circle cx="42" cy="-2" r="8" fill="url(#knob-gradient-green)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="42" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="40" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <text x="30" y="52" class="brick-text" font-size="40" fill="#0f172a" text-anchor="middle">i</text>
      </g>
    </g>

    <!-- s: Blue (#38bdf8) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(136, 0)">
        <rect x="0" y="8" width="60" height="68" rx="4" fill="url(#brick-blue)" stroke="#0f172a" stroke-width="2" />
        <rect x="0" y="8" width="60" height="3" fill="rgba(255, 255, 255, 0.15)" rx="4" />
        <polygon points="60,8 63,5 63,73 60,76" fill="rgba(0, 0, 0, 0.3)" />
        
        <circle cx="18" cy="-2" r="8" fill="url(#knob-gradient-blue)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="18" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="16" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <circle cx="42" cy="-2" r="8" fill="url(#knob-gradient-blue)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="42" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="40" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <text x="30" y="52" class="brick-text" font-size="40" fill="#ffffff" text-anchor="middle">s</text>
      </g>
    </g>

    <!-- h: Blue (#0ea5e9) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(204, 0)">
        <rect x="0" y="8" width="60" height="68" rx="4" fill="url(#brick-blue)" stroke="#0f172a" stroke-width="2" />
        <rect x="0" y="8" width="60" height="3" fill="rgba(255, 255, 255, 0.15)" rx="4" />
        <polygon points="60,8 63,5 63,73 60,76" fill="rgba(0, 0, 0, 0.3)" />
        
        <circle cx="18" cy="-2" r="8" fill="url(#knob-gradient-blue)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="18" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="16" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <circle cx="42" cy="-2" r="8" fill="url(#knob-gradient-blue)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="42" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="40" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <text x="30" y="52" class="brick-text" font-size="40" fill="#ffffff" text-anchor="middle">h</text>
      </g>
    </g>

    <!-- n: Red (#f43f5e) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(272, 0)">
        <rect x="0" y="8" width="60" height="68" rx="4" fill="url(#brick-red)" stroke="#0f172a" stroke-width="2" />
        <rect x="0" y="8" width="60" height="3" fill="rgba(255, 255, 255, 0.15)" rx="4" />
        <polygon points="60,8 63,5 63,73 60,76" fill="rgba(0, 0, 0, 0.3)" />
        
        <circle cx="18" cy="-2" r="8" fill="url(#knob-gradient-red)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="18" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="16" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <circle cx="42" cy="-2" r="8" fill="url(#knob-gradient-red)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="42" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="40" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <text x="30" y="52" class="brick-text" font-size="40" fill="#ffffff" text-anchor="middle">n</text>
      </g>
    </g>

    <!-- u: Green (#10b981) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(340, 0)">
        <rect x="0" y="8" width="60" height="68" rx="4" fill="url(#brick-green)" stroke="#0f172a" stroke-width="2" />
        <rect x="0" y="8" width="60" height="3" fill="rgba(255, 255, 255, 0.15)" rx="4" />
        <polygon points="60,8 63,5 63,73 60,76" fill="rgba(0, 0, 0, 0.3)" />
        
        <circle cx="18" cy="-2" r="8" fill="url(#knob-gradient-green)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="18" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="16" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <circle cx="42" cy="-2" r="8" fill="url(#knob-gradient-green)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="42" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="40" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <text x="30" y="52" class="brick-text" font-size="40" fill="#0f172a" text-anchor="middle">u</text>
      </g>
    </g>

    <!-- P: Red (#f43f5e) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(428, 0)">
        <rect x="0" y="8" width="60" height="68" rx="4" fill="url(#brick-red)" stroke="#0f172a" stroke-width="2" />
        <rect x="0" y="8" width="60" height="3" fill="rgba(255, 255, 255, 0.15)" rx="4" />
        <polygon points="60,8 63,5 63,73 60,76" fill="rgba(0, 0, 0, 0.3)" />
        
        <circle cx="18" cy="-2" r="8" fill="url(#knob-gradient-red)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="18" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="16" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <circle cx="42" cy="-2" r="8" fill="url(#knob-gradient-red)" stroke="rgba(0, 0, 0, 0.3)" stroke-width="1" />
        <circle cx="42" cy="-2" r="7" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1" />
        <circle cx="40" cy="-4" r="2" fill="rgba(255, 255, 255, 0.4)" />
        
        <text x="30" y="52" class="brick-text" font-size="40" fill="#ffffff" text-anchor="middle">P</text>
      </g>
    </g>

  </g>

  <!-- Subtitle -->
  <text x="425" y="143" class="subtitle" text-anchor="middle">AI ENGINEER &amp; AGENTIC SYSTEMS BUILDER</text>

  <!-- Code Line — terminal green -->
  <text x="425" y="168" class="code-line" text-anchor="middle">&gt; I turn ideas into production AI systems.</text>

</svg>