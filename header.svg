<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@700;800;900&amp;display=swap');
      
      .brick-text {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        text-shadow: 1px 2px 0px rgba(0, 0, 0, 0.5);
      }
      .subtitle {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 5px;
        fill: #94a3b8;
      }
      .code-line {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #10b981;
      }

      /* Staggered brick animations */
      @keyframes brickDrop {
        0% {
          opacity: 0;
          transform: translateY(-40px) scale(0.8);
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes brickBounce {
        0% {
          transform: translateY(0);
        }
        25% {
          transform: translateY(-8px);
        }
        50% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(0);
        }
      }

      /* Glow animation for bricks */
      @keyframes brickGlow {
        0%, 100% {
          filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0));
        }
        50% {
          filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
        }
      }

      /* Rotation animation */
      @keyframes brickSpin {
        0% {
          transform: rotateZ(0deg);
        }
        100% {
          transform: rotateZ(360deg);
        }
      }

      .brick-1 { animation: brickDrop 0.6s ease-out 0s, brickBounce 2s ease-in-out 0.6s infinite, brickGlow 3s ease-in-out 0.6s infinite; }
      .brick-2 { animation: brickDrop 0.6s ease-out 0.1s, brickBounce 2s ease-in-out 0.7s infinite, brickGlow 3s ease-in-out 0.7s infinite; }
      .brick-3 { animation: brickDrop 0.6s ease-out 0.2s, brickBounce 2s ease-in-out 0.8s infinite, brickGlow 3s ease-in-out 0.8s infinite; }
      .brick-4 { animation: brickDrop 0.6s ease-out 0.3s, brickBounce 2s ease-in-out 0.9s infinite, brickGlow 3s ease-in-out 0.9s infinite; }
      .brick-5 { animation: brickDrop 0.6s ease-out 0.4s, brickBounce 2s ease-in-out 1s infinite, brickGlow 3s ease-in-out 1s infinite; }
      .brick-6 { animation: brickDrop 0.6s ease-out 0.5s, brickBounce 2s ease-in-out 1.1s infinite, brickGlow 3s ease-in-out 1.1s infinite; }
      .brick-7 { animation: brickDrop 0.6s ease-out 0.6s, brickBounce 2s ease-in-out 1.2s infinite, brickGlow 3s ease-in-out 1.2s infinite; }

      @keyframes fadeInUp {
        0% {
          opacity: 0;
          transform: translateY(10px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Shimmer effect */
      @keyframes shimmer {
        0% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.5;
        }
      }

      .subtitle-text { animation: fadeInUp 0.8s ease-out 1.2s both; }
      .code-text { animation: fadeInUp 0.8s ease-out 1.4s both, shimmer 3s ease-in-out 1.4s infinite; }
    </style>
    
    <!-- Deep Skunkworks background -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>

    <!-- Ambient glow filters -->
    <filter id="blur-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="35" />
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Baseplate Background -->
  <rect width="850" height="200" fill="url(#bg-gradient)" rx="10" />
  <rect width="850" height="200" fill="none" stroke="#0f172a" stroke-width="1.5" rx="10" />

  <!-- Ambient Glow Orbs (matching portfolio orb-1, orb-2, orb-3) -->
  <circle cx="200" cy="90" r="130" fill="#10b981" opacity="0.06" filter="url(#blur-filter)"/>
  <circle cx="650" cy="100" r="110" fill="#38bdf8" opacity="0.05" filter="url(#blur-filter)"/>
  <circle cx="425" cy="140" r="80" fill="#f43f5e" opacity="0.04" filter="url(#blur-filter)"/>

  <!-- The Bricks (translated to X=197, Y=30) -->
  <g transform="translate(197, 30)">
    
    <!-- V: Red (#f43f5e) -->
    <g class="brick-1">
      <g transform="translate(0, 0)">
        <rect x="0" y="5" width="56" height="70" rx="6" fill="#0f172a" />
        <rect x="0" y="0" width="56" height="70" rx="6" fill="#f43f5e" stroke="#0f172a" stroke-width="3.5" />
        <rect x="16" y="-8" width="24" height="10" rx="2" fill="#f43f5e" stroke="#0f172a" stroke-width="3.5" />
        <rect x="18" y="-2" width="20" height="4" fill="#f43f5e" />
        <ellipse cx="28" cy="-8" rx="12" ry="4" fill="#fb7185" stroke="#0f172a" stroke-width="3.5" />
        <text x="28" y="47" class="brick-text" font-size="38" fill="#ffffff" text-anchor="middle">V</text>
      </g>
    </g>

    <!-- i: Green (#10b981) -->
    <g class="brick-2">
      <g transform="translate(64, 0)">
        <rect x="0" y="5" width="56" height="70" rx="6" fill="#0f172a" />
        <rect x="0" y="0" width="56" height="70" rx="6" fill="#10b981" stroke="#0f172a" stroke-width="3.5" />
        <rect x="16" y="-8" width="24" height="10" rx="2" fill="#10b981" stroke="#0f172a" stroke-width="3.5" />
        <rect x="18" y="-2" width="20" height="4" fill="#10b981" />
        <ellipse cx="28" cy="-8" rx="12" ry="4" fill="#6ee7b7" stroke="#0f172a" stroke-width="3.5" />
        <text x="28" y="47" class="brick-text" font-size="38" fill="#0f172a" text-anchor="middle">i</text>
      </g>
    </g>

    <!-- s: Blue (#38bdf8) -->
    <g class="brick-3">
      <g transform="translate(128, 0)">
        <rect x="0" y="5" width="56" height="70" rx="6" fill="#0f172a" />
        <rect x="0" y="0" width="56" height="70" rx="6" fill="#0ea5e9" stroke="#0f172a" stroke-width="3.5" />
        <rect x="16" y="-8" width="24" height="10" rx="2" fill="#0ea5e9" stroke="#0f172a" stroke-width="3.5" />
        <rect x="18" y="-2" width="20" height="4" fill="#0ea5e9" />
        <ellipse cx="28" cy="-8" rx="12" ry="4" fill="#38bdf8" stroke="#0f172a" stroke-width="3.5" />
        <text x="28" y="47" class="brick-text" font-size="38" fill="#ffffff" text-anchor="middle">s</text>
      </g>
    </g>

    <!-- h: Blue (#0ea5e9) -->
    <g class="brick-4">
      <g transform="translate(192, 0)">
        <rect x="0" y="5" width="56" height="70" rx="6" fill="#0f172a" />
        <rect x="0" y="0" width="56" height="70" rx="6" fill="#0ea5e9" stroke="#0f172a" stroke-width="3.5" />
        <rect x="16" y="-8" width="24" height="10" rx="2" fill="#0ea5e9" stroke="#0f172a" stroke-width="3.5" />
        <rect x="18" y="-2" width="20" height="4" fill="#0ea5e9" />
        <ellipse cx="28" cy="-8" rx="12" ry="4" fill="#38bdf8" stroke="#0f172a" stroke-width="3.5" />
        <text x="28" y="47" class="brick-text" font-size="38" fill="#ffffff" text-anchor="middle">h</text>
      </g>
    </g>

    <!-- n: Red (#f43f5e) -->
    <g class="brick-5">
      <g transform="translate(256, 0)">
        <rect x="0" y="5" width="56" height="70" rx="6" fill="#0f172a" />
        <rect x="0" y="0" width="56" height="70" rx="6" fill="#f43f5e" stroke="#0f172a" stroke-width="3.5" />
        <rect x="16" y="-8" width="24" height="10" rx="2" fill="#f43f5e" stroke="#0f172a" stroke-width="3.5" />
        <rect x="18" y="-2" width="20" height="4" fill="#f43f5e" />
        <ellipse cx="28" cy="-8" rx="12" ry="4" fill="#fb7185" stroke="#0f172a" stroke-width="3.5" />
        <text x="28" y="47" class="brick-text" font-size="38" fill="#ffffff" text-anchor="middle">n</text>
      </g>
    </g>

    <!-- u: Green (#10b981) -->
    <g class="brick-6">
      <g transform="translate(320, 0)">
        <rect x="0" y="5" width="56" height="70" rx="6" fill="#0f172a" />
        <rect x="0" y="0" width="56" height="70" rx="6" fill="#10b981" stroke="#0f172a" stroke-width="3.5" />
        <rect x="16" y="-8" width="24" height="10" rx="2" fill="#10b981" stroke="#0f172a" stroke-width="3.5" />
        <rect x="18" y="-2" width="20" height="4" fill="#10b981" />
        <ellipse cx="28" cy="-8" rx="12" ry="4" fill="#6ee7b7" stroke="#0f172a" stroke-width="3.5" />
        <text x="28" y="47" class="brick-text" font-size="38" fill="#0f172a" text-anchor="middle">u</text>
      </g>
    </g>

    <!-- P: Red (#f43f5e) — after space -->
    <g class="brick-7">
      <g transform="translate(400, 0)">
        <rect x="0" y="5" width="56" height="70" rx="6" fill="#0f172a" />
        <rect x="0" y="0" width="56" height="70" rx="6" fill="#f43f5e" stroke="#0f172a" stroke-width="3.5" />
        <rect x="16" y="-8" width="24" height="10" rx="2" fill="#f43f5e" stroke="#0f172a" stroke-width="3.5" />
        <rect x="18" y="-2" width="20" height="4" fill="#f43f5e" />
        <ellipse cx="28" cy="-8" rx="12" ry="4" fill="#fb7185" stroke="#0f172a" stroke-width="3.5" />
        <text x="28" y="47" class="brick-text" font-size="38" fill="#ffffff" text-anchor="middle">P</text>
      </g>
    </g>

  </g>

  <!-- Subtitle -->
  <text x="425" y="143" class="subtitle subtitle-text" text-anchor="middle">AI ENGINEER &amp; AGENTIC SYSTEMS BUILDER</text>

  <!-- Code Line — terminal green -->
  <text x="425" y="168" class="code-line code-text" text-anchor="middle">&gt; I turn ideas into production AI systems.</text>

  <!-- Pulsing green dot -->
  <circle cx="280" cy="165" r="3" fill="#10b981" filter="url(#glow-green)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>