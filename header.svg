<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Space+Grotesk:wght@700;800;900&amp;display=swap');
      
      .brick-text {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        text-shadow: 1px 2px 0px rgba(0, 0, 0, 0.5);
      }
      .subtitle {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 5px;
        fill: #94a3b8;
      }
      .code-line {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        fill: #10b981;
      }

      /* Subtle border glow pulse animation */
      @keyframes borderPulse {
        0% {
          stroke-width: 1.5;
          stroke-opacity: 0.3;
          filter: drop-shadow(0 0 0px rgba(16, 185, 129, 0));
        }
        50% {
          stroke-width: 2;
          stroke-opacity: 0.6;
          filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
        }
        100% {
          stroke-width: 1.5;
          stroke-opacity: 0.3;
          filter: drop-shadow(0 0 0px rgba(16, 185, 129, 0));
        }
      }

      .glow-border {
        animation: borderPulse 2.5s ease-in-out 0.3s, borderPulse 2.5s ease-in-out 3s;
      }
    </style>
    
    <!-- Deep Skunkworks background -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>

    <!-- Ambient glow filters -->
    <filter id="blur-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="35" />
    </filter>

    <!-- 3D depth shadow filters -->
    <filter id="brick-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.4" flood-color="#000000" />
    </filter>

    <!-- Brick face gradients for premium depth -->
    <linearGradient id="brick-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <linearGradient id="brick-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="brick-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
  </defs>

  <!-- Baseplate Background -->
  <rect width="850" height="200" fill="url(#bg-gradient)" rx="10" />
  
  <!-- Animated Glow Border -->
  <rect class="glow-border" width="850" height="200" fill="none" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" rx="10" />

  <!-- Ambient Glow Orbs (matching portfolio orb-1, orb-2, orb-3) -->
  <circle cx="200" cy="90" r="130" fill="#10b981" opacity="0.06" filter="url(#blur-filter)"/>
  <circle cx="650" cy="100" r="110" fill="#38bdf8" opacity="0.05" filter="url(#blur-filter)"/>
  <circle cx="425" cy="140" r="80" fill="#f43f5e" opacity="0.04" filter="url(#blur-filter)"/>

  <!-- Premium Lego-Style Boxes (No Knobs) (translated to X=170, Y=30) -->
  <g transform="translate(170, 30)">
    
    <!-- V: Red (#f43f5e) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(0, 0)">
        <!-- Main brick face -->
        <rect x="0" y="0" width="65" height="75" rx="5" fill="url(#brick-red)" stroke="#0f172a" stroke-width="2.5" />
        
        <!-- Top edge highlight for 3D depth -->
        <rect x="0" y="0" width="65" height="4" fill="rgba(255, 255, 255, 0.2)" rx="5" />
        
        <!-- Right side shadow for perspective -->
        <polygon points="65,0 68,0 68,75 65,75" fill="rgba(0, 0, 0, 0.25)" />
        
        <!-- Bottom shadow for depth -->
        <polygon points="0,75 65,75 68,78 3,78" fill="rgba(0, 0, 0, 0.2)" />
        
        <!-- Character -->
        <text x="32.5" y="52" class="brick-text" font-size="42" fill="#ffffff" text-anchor="middle">V</text>
      </g>
    </g>

    <!-- i: Green (#10b981) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(75, 0)">
        <rect x="0" y="0" width="65" height="75" rx="5" fill="url(#brick-green)" stroke="#0f172a" stroke-width="2.5" />
        <rect x="0" y="0" width="65" height="4" fill="rgba(255, 255, 255, 0.2)" rx="5" />
        <polygon points="65,0 68,0 68,75 65,75" fill="rgba(0, 0, 0, 0.25)" />
        <polygon points="0,75 65,75 68,78 3,78" fill="rgba(0, 0, 0, 0.2)" />
        <text x="32.5" y="52" class="brick-text" font-size="42" fill="#0f172a" text-anchor="middle">i</text>
      </g>
    </g>

    <!-- s: Blue (#0ea5e9) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(150, 0)">
        <rect x="0" y="0" width="65" height="75" rx="5" fill="url(#brick-blue)" stroke="#0f172a" stroke-width="2.5" />
        <rect x="0" y="0" width="65" height="4" fill="rgba(255, 255, 255, 0.2)" rx="5" />
        <polygon points="65,0 68,0 68,75 65,75" fill="rgba(0, 0, 0, 0.25)" />
        <polygon points="0,75 65,75 68,78 3,78" fill="rgba(0, 0, 0, 0.2)" />
        <text x="32.5" y="52" class="brick-text" font-size="42" fill="#ffffff" text-anchor="middle">s</text>
      </g>
    </g>

    <!-- h: Blue (#0ea5e9) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(225, 0)">
        <rect x="0" y="0" width="65" height="75" rx="5" fill="url(#brick-blue)" stroke="#0f172a" stroke-width="2.5" />
        <rect x="0" y="0" width="65" height="4" fill="rgba(255, 255, 255, 0.2)" rx="5" />
        <polygon points="65,0 68,0 68,75 65,75" fill="rgba(0, 0, 0, 0.25)" />
        <polygon points="0,75 65,75 68,78 3,78" fill="rgba(0, 0, 0, 0.2)" />
        <text x="32.5" y="52" class="brick-text" font-size="42" fill="#ffffff" text-anchor="middle">h</text>
      </g>
    </g>

    <!-- n: Red (#f43f5e) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(300, 0)">
        <rect x="0" y="0" width="65" height="75" rx="5" fill="url(#brick-red)" stroke="#0f172a" stroke-width="2.5" />
        <rect x="0" y="0" width="65" height="4" fill="rgba(255, 255, 255, 0.2)" rx="5" />
        <polygon points="65,0 68,0 68,75 65,75" fill="rgba(0, 0, 0, 0.25)" />
        <polygon points="0,75 65,75 68,78 3,78" fill="rgba(0, 0, 0, 0.2)" />
        <text x="32.5" y="52" class="brick-text" font-size="42" fill="#ffffff" text-anchor="middle">n</text>
      </g>
    </g>

    <!-- u: Green (#10b981) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(375, 0)">
        <rect x="0" y="0" width="65" height="75" rx="5" fill="url(#brick-green)" stroke="#0f172a" stroke-width="2.5" />
        <rect x="0" y="0" width="65" height="4" fill="rgba(255, 255, 255, 0.2)" rx="5" />
        <polygon points="65,0 68,0 68,75 65,75" fill="rgba(0, 0, 0, 0.25)" />
        <polygon points="0,75 65,75 68,78 3,78" fill="rgba(0, 0, 0, 0.2)" />
        <text x="32.5" y="52" class="brick-text" font-size="42" fill="#0f172a" text-anchor="middle">u</text>
      </g>
    </g>

    <!-- P: Red (#f43f5e) -->
    <g filter="url(#brick-shadow)">
      <g transform="translate(465, 0)">
        <rect x="0" y="0" width="65" height="75" rx="5" fill="url(#brick-red)" stroke="#0f172a" stroke-width="2.5" />
        <rect x="0" y="0" width="65" height="4" fill="rgba(255, 255, 255, 0.2)" rx="5" />
        <polygon points="65,0 68,0 68,75 65,75" fill="rgba(0, 0, 0, 0.25)" />
        <polygon points="0,75 65,75 68,78 3,78" fill="rgba(0, 0, 0, 0.2)" />
        <text x="32.5" y="52" class="brick-text" font-size="42" fill="#ffffff" text-anchor="middle">P</text>
      </g>
    </g>

  </g>

  <!-- Subtitle -->
  <text x="425" y="143" class="subtitle" text-anchor="middle">AI ENGINEER &amp; AGENTIC SYSTEMS BUILDER</text>

  <!-- Code Line — terminal green -->
  <text x="425" y="168" class="code-line" text-anchor="middle">&gt; I turn ideas into production AI systems.</text>

</svg>