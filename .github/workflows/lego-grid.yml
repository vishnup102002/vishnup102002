name: Build Lego Contribution Grid

on:
  schedule:
    - cron: "0 */6 * * *"   # regenerate every 6 hours
  push:
    branches: [main]
  workflow_dispatch: {}

# Explicitly grant write permissions to GITHUB_TOKEN to push to the output branch
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22    # Updated from 20 to 22 (LTS) to clear deprecation warnings

      - name: Generate Lego grid from real contribution data
        env:
          GH_LOGIN: vishnup102002
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-lego-grid.mjs

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
